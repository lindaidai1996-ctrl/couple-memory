<h2>骨架屏动画风格</h2>
<p class="subtitle">选择适合你项目双色调体系的加载动画方式</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #faf8f5;">
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <div style="width: 100%; height: 20px; border-radius: 6px; background: linear-gradient(90deg, #ede8e3 25%, #f5f1ed 50%, #ede8e3 75%); background-size: 200% 100%; animation: shimmerA 1.5s infinite ease-in-out;"></div>
        <div style="width: 60%; height: 20px; border-radius: 6px; background: linear-gradient(90deg, #ede8e3 25%, #f5f1ed 50%, #ede8e3 75%); background-size: 200% 100%; animation: shimmerA 1.5s infinite ease-in-out; animation-delay: 0.1s;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-top: 8px;">
          <div style="aspect-ratio: 1; border-radius: 12px; background: linear-gradient(90deg, #ede8e3 25%, #f5f1ed 50%, #ede8e3 75%); background-size: 200% 100%; animation: shimmerA 1.5s infinite ease-in-out; animation-delay: 0.2s;"></div>
          <div style="aspect-ratio: 1; border-radius: 12px; background: linear-gradient(90deg, #ede8e3 25%, #f5f1ed 50%, #ede8e3 75%); background-size: 200% 100%; animation: shimmerA 1.5s infinite ease-in-out; animation-delay: 0.3s;"></div>
          <div style="aspect-ratio: 1; border-radius: 12px; background: linear-gradient(90deg, #ede8e3 25%, #f5f1ed 50%, #ede8e3 75%); background-size: 200% 100%; animation: shimmerA 1.5s infinite ease-in-out; animation-delay: 0.4s;"></div>
        </div>
      </div>
      <style>
        @keyframes shimmerA { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      </style>
    </div>
    <div class="card-body">
      <h3>A. Shimmer（微光扫过）</h3>
      <p>经典方案，高光从左向右扫过占位块。与 warm-* 色系契合度高，视觉温暖柔和。</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #faf8f5;">
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <div style="width: 100%; height: 20px; border-radius: 6px; background: #ede8e3; animation: pulseB 1.8s infinite ease-in-out;"></div>
        <div style="width: 60%; height: 20px; border-radius: 6px; background: #ede8e3; animation: pulseB 1.8s infinite ease-in-out; animation-delay: 0.2s;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-top: 8px;">
          <div style="aspect-ratio: 1; border-radius: 12px; background: #ede8e3; animation: pulseB 1.8s infinite ease-in-out; animation-delay: 0.3s;"></div>
          <div style="aspect-ratio: 1; border-radius: 12px; background: #ede8e3; animation: pulseB 1.8s infinite ease-in-out; animation-delay: 0.5s;"></div>
          <div style="aspect-ratio: 1; border-radius: 12px; background: #ede8e3; animation: pulseB 1.8s infinite ease-in-out; animation-delay: 0.7s;"></div>
        </div>
      </div>
      <style>
        @keyframes pulseB { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
      </style>
    </div>
    <div class="card-body">
      <h3>B. Pulse（呼吸脉动）</h3>
      <p>占位块整体透明度呼吸变化，更安静克制。适合极简风格，实现简单。</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #faf8f5;">
      <div style="display: flex; gap: 12px; flex-wrap: wrap;">
        <div style="width: 100%; height: 20px; border-radius: 6px; background: #ede8e3; animation: waveC 1.2s ease-in-out forwards; opacity: 0; animation-delay: 0s; animation-iteration-count: infinite; animation-direction: alternate;"></div>
        <div style="width: 60%; height: 20px; border-radius: 6px; background: #ede8e3; animation: waveC 1.2s ease-in-out forwards; opacity: 0; animation-delay: 0.15s; animation-iteration-count: infinite; animation-direction: alternate;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; margin-top: 8px;">
          <div style="aspect-ratio: 1; border-radius: 12px; background: #ede8e3; animation: waveC 1.2s ease-in-out forwards; opacity: 0; animation-delay: 0.3s; animation-iteration-count: infinite; animation-direction: alternate;"></div>
          <div style="aspect-ratio: 1; border-radius: 12px; background: #ede8e3; animation: waveC 1.2s ease-in-out forwards; opacity: 0; animation-delay: 0.45s; animation-iteration-count: infinite; animation-direction: alternate;"></div>
          <div style="aspect-ratio: 1; border-radius: 12px; background: #ede8e3; animation: waveC 1.2s ease-in-out forwards; opacity: 0; animation-delay: 0.6s; animation-iteration-count: infinite; animation-direction: alternate;"></div>
        </div>
      </div>
      <style>
        @keyframes waveC { 0% { opacity: 0; transform: translateY(4px); } 100% { opacity: 1; transform: translateY(0); } }
      </style>
    </div>
    <div class="card-body">
      <h3>C. Stagger Wave（交错浮现）</h3>
      <p>占位块依次浮现，有节奏感和层次感。与 Framer Motion 交错入场动画一脉相承。</p>
    </div>
  </div>
</div>

<p class="subtitle" style="margin-top: 24px;">注：公开页（暗色 film-* 主题）会自动适配对应的暗色占位块颜色</p>
