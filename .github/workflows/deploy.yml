name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.cn-guangzhou.aliyuncs.com
  IMAGE: registry.cn-guangzhou.aliyuncs.com/couple-memory/app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint & Type-check
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit

      - name: Login to Alibaba Cloud ACR
        run: |
          docker login -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} ${{ env.REGISTRY }}

      - name: Build & Push Docker Image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker login -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }} registry.cn-guangzhou.aliyuncs.com
            cd /opt/couple-memory
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy
            sleep 5
            curl -f http://localhost:3000/api/health || exit 1
